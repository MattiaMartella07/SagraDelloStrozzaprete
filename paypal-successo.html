<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento Completato · Sagra dello Strozzaprete</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #f7efe2;
            font-family: 'Trebuchet MS', sans-serif;
            color: #2c1e12;
        }
        .top-bar {
            background-color: #db270f;
            color: white;
            border-bottom: 3px solid #e5b887;
        }
        .success-container {
            background: white;
            border-radius: 30px;
            border: 4px solid #28a745;
            padding: 3rem;
            text-align: center;
            max-width: 600px;
            margin: 3rem auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .success-icon {
            font-size: 5rem;
            color: #28a745;
        }
        .btn-home {
            background-color: #db270f;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 1rem 2rem;
            font-weight: 700;
            text-decoration: none;
            display: inline-block;
            margin: 1rem;
        }
        .footer {
            background-color: #3c2a1f;
            color: #ffe5ce;
            text-align: center;
            padding: 2rem;
            border-top: 6px solid #b68152;
            margin-top: 2rem;
        }     
    </style>
    <!-- Aggiungi nel <head> di paypal-successo.html -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

<script>
    // Inizializza EmailJS
    emailjs.init("YOUR_USER_ID");
    
    function sendConfirmationEmail(order) {
        const templateParams = {
            to_email: order.customer.email,
            to_name: order.customer.name,
            order_date: order.day,
            order_time: order.time,
            order_total: `€${order.total.toFixed(2)}`,
            order_id: order.id
        };
        
        emailjs.send('YOUR_SERVICE_ID', 'YOUR_TEMPLATE_ID', templateParams)
            .then(() => console.log('Email inviata'))
            .catch(err => console.error('Errore email:', err));
    }
</script>
</head>
<body>
    <div class="top-bar py-2">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-12 col-md-6">
                    <span class="text-white"><i class="bi bi-telephone-fill"></i> 351 934 8794</span>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="success-container">
            <div class="success-icon">
                <i class="bi bi-check-circle-fill"></i>
            </div>
            <h1 class="display-4 fw-bold text-success mb-3">Pagamento Completato!</h1>
            <p class="fs-4">Grazie per il tuo ordine!</p>
            <p class="fs-5">La tua prenotazione è stata confermata e riceverai una email di riepilogo.</p>
            <p class="fs-6 text-muted">ID Transazione: <span id="txn-id">In caricamento...</span></p>
            <div class="mt-4">
                <a href="index.html" class="btn-home"><i class="bi bi-house"></i> Torna alla Home</a>
                <a href="MENU.html" class="btn-home" style="background-color: #e2750f;">Nuovo Ordine</a>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>Sagra dello Strozzaprete · Pro Loco Paciano</p>
    </footer>

    <script>
        // Recupera i parametri dall'URL (PayPal li passa automaticamente)
        const urlParams = new URLSearchParams(window.location.search);
        const txnId = urlParams.get('tx') || 'PayPal-' + Date.now();
        document.getElementById('txn-id').textContent = txnId;
        
        // Recupera l'ordine in attesa e lo conferma
        const pendingOrder = JSON.parse(localStorage.getItem('pendingPaypalOrder'));
        if (pendingOrder) {
            pendingOrder.status = 'Confermato';
            pendingOrder.paypalTxnId = txnId;
            pendingOrder.timestamp = new Date().toLocaleString();
            
            // Salva negli ordini confermati
            const orders = JSON.parse(localStorage.getItem('sagraOrders')) || [];
            orders.push(pendingOrder);
            localStorage.setItem('sagraOrders', JSON.stringify(orders));
            
            // Pulisci
            localStorage.removeItem('pendingPaypalOrder');
            
            // Qui potresti anche inviare una email usando EmailJS
            console.log('Ordine confermato:', pendingOrder);
        }
    </script>
</body>
</html>
