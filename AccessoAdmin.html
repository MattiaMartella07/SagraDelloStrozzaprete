    <style>
        /* I TUOI STILI ESISTENTI - INVARIATI */
        :root {
            --rosso-sagra: #db270f;
            --arancio-sagra: #e2750f;
            --giallo-sagra: #ffd700;
            --crema-sfondo: #f7efe2;
            --marrone-scuro: #2c1e12;
            --marrone-chiaro: #6b4f3a;
            --oro-gradient: linear-gradient(135deg, #ffd700 0%, #ffa500 100%);
            --ombra-testo: 2px 2px 4px rgba(0,0,0,0.3);
            --ombra-carta: 0 10px 30px rgba(219, 39, 15, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--crema-sfondo);
            font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
            color: var(--marrone-scuro);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .top-bar {
            background-color: var(--rosso-sagra);
            color: white;
            border-bottom: 3px solid #e5b887;
            font-weight: 600;
        }

        .top-bar-right a {
            color: #ffeacc;
            text-decoration: none;
            font-size: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 5px 10px;
            border-radius: 30px;
            position: relative;
            transition: all 0.3s ease;
        }

        .top-bar-right a:hover {
            background-color: var(--arancio-sagra);
            color: white;
            transform: translateY(-2px);
        }

        .cart-badge {
            background-color: var(--giallo-sagra);
            color: var(--marrone-scuro);
            border-radius: 50%;
            padding: 0.2rem 0.5rem;
            font-size: 0.7rem;
            font-weight: bold;
            position: absolute;
            top: -3px;
            right: -3px;
            border: 2px solid white;
        }

        .hero-moderno {
            position: relative;
            width: 100%;
            height: 250px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 8px solid var(--arancio-sagra);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            isolation: isolate;
        }

        .hero-background {
            position: absolute;
            inset: 0;
            background-image: url('sagra_strozzaprete.jpeg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            filter: blur(4px);
            transform: scale(1.1);
            transition: transform 0.1s ease-out;
        }

        .hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(
                45deg,
                rgba(219, 39, 15, 0.7) 0%,
                rgba(226, 117, 15, 0.5) 50%,
                rgba(0, 0, 0, 0.4) 100%
            );
        }

        .hero-content {
            position: relative;
            z-index: 2;
            text-align: center;
            color: white;
            padding: 20px;
            animation: fadeInScale 1.2s ease-out;
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .hero-title-moderno {
            font-family: 'Brush Script MT', cursive;
            font-size: 3.5rem;
            font-weight: 400;
            text-shadow: 4px 4px 0 rgba(0,0,0,0.3);
            color: white;
            margin-bottom: 0.5rem;
        }

        .hero-sub-moderno {
            font-size: 1.3rem;
            font-weight: 600;
            background: var(--oro-gradient);
            display: inline-block;
            padding: 0.5rem 2rem;
            border-radius: 60px;
            border: 3px solid white;
            color: var(--marrone-scuro);
        }

        .nav-bar-moderna {
            background-color: var(--rosso-sagra);
            padding: 0.8rem 1rem;
            border-bottom: 4px solid #f3c38d;
            box-shadow: 0 5px 0 #4e2f1d;
            position: sticky;
            top: 0;
            z-index: 999;
        }

        .nav-bar-moderna .nav-link {
            color: #fef7d6;
            font-size: 1.2rem;
            font-weight: 700;
            padding: 0.4rem 1rem;
            border-radius: 40px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
        }

        .nav-bar-moderna .nav-link::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 3px;
            background: var(--giallo-sagra);
            transition: width 0.3s ease;
        }

        .nav-bar-moderna .nav-link:hover::before,
        .nav-bar-moderna .nav-link.active::before {
            width: 80%;
        }

        .nav-bar-moderna .nav-link:hover,
        .nav-bar-moderna .nav-link.active {
            background-color: var(--arancio-sagra);
            color: white;
            transform: translateY(-2px);
        }

        .login-card-moderna {
            background: white;
            border-radius: 50px;
            border: 4px solid var(--rosso-sagra);
            padding: 3rem;
            box-shadow: var(--ombra-carta);
            max-width: 500px;
            margin: 3rem auto;
            position: relative;
            overflow: hidden;
        }

        .login-card-moderna::before {
            content: '🔐';
            position: absolute;
            top: -20px;
            right: -20px;
            font-size: 8rem;
            opacity: 0.05;
            transform: rotate(15deg);
        }

        .login-title-moderna {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: var(--rosso-sagra);
            border-bottom: 3px solid var(--arancio-sagra);
            padding-bottom: 1rem;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: center;
        }

        .form-label-moderna {
            font-weight: 600;
            color: var(--marrone-scuro);
            margin-bottom: 0.5rem;
        }

        .form-control-moderna {
            border: 2px solid var(--arancio-sagra);
            border-radius: 30px;
            padding: 0.8rem 1.2rem;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-control-moderna:focus {
            border-color: var(--rosso-sagra);
            box-shadow: 0 0 0 4px rgba(219, 39, 15, 0.1);
            outline: none;
        }

        .btn-login-moderno {
            background: linear-gradient(135deg, var(--rosso-sagra), var(--arancio-sagra));
            color: white;
            border: none;
            border-radius: 50px;
            padding: 1rem;
            font-weight: 700;
            font-size: 1.2rem;
            width: 100%;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            z-index: 1;
            box-shadow: 0 5px 15px rgba(219, 39, 15, 0.4);
        }

        .btn-login-moderno::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
            z-index: -1;
        }

        .btn-login-moderno:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(219, 39, 15, 0.6);
        }

        .btn-login-moderno:hover::before {
            left: 100%;
        }

        .footer-moderno {
            background: linear-gradient(135deg, var(--marrone-scuro), #4a2e1b);
            color: #ffe5ce;
            text-align: center;
            padding: 2rem;
            border-top: 6px solid var(--arancio-sagra);
            margin-top: auto;
        }

        .footer-moderno p {
            font-size: 1rem;
            margin-bottom: 0.3rem;
        }

        .footer-moderno i {
            color: var(--giallo-sagra);
            margin-right: 0.3rem;
        }

        .fade-in {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .fade-in.visible {
            opacity: 1;
            transform: translateY(0);
        }

        @media (max-width: 768px) {
            .hero-title-moderno {
                font-size: 2.5rem;
            }
            
            .hero-sub-moderno {
                font-size: 1.1rem;
            }
            
            .login-card-moderna {
                padding: 2rem;
                margin: 2rem 1rem;
            }
            
            .login-title-moderna {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // Configurazione Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyC6sTFxBOXRzZ2nMXhm_XMOxVnFcdUncGM",
            authDomain: "sagra-strozzaprete2026.firebaseapp.com",
            projectId: "sagra-strozzaprete2026",
            storageBucket: "sagra-strozzaprete2026.firebasestorage.app",
            messagingSenderId: "711270004618",
            appId: "1:711270004618:web:86c8b4f0b54105a41a7a73"
        };

        // Inizializza Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Configura persistence (mantieni login)
        auth.setPersistence(firebase.auth.Auth.Persistence.SESSION);

        // Elementi DOM
        const loginForm = document.getElementById('loginForm');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const errorDiv = document.getElementById('error-message');
        const loginBtn = document.getElementById('login-btn');

        // MAPPING USERNAME -> EMAIL (SOLO PER IL TUO ACCOUNT)
        // Qui inserisci la corrispondenza tra username e email Firebase
        const usernameToEmail = {
    'AdminSagra': 'admin@sagra.it'  // <- METTI L'EMAIL CHE HAI USATO IN FIREBASE
};

        // Gestione login
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = usernameInput.value.trim();
            const password = passwordInput.value;
            
            // Disabilita bottone durante il login
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Accesso in corso...';
            hideError();
            
            try {
                // Converti username in email usando il mapping
                const email = usernameToEmail[username];
                
                if (!email) {
                    throw new Error('Utente non autorizzato');
                }
                
                // Prova il login con Firebase
                await auth.signInWithEmailAndPassword(email, password);
                
                // Login riuscito - reindirizza alla dashboard
                window.location.href = 'dashboard.html';
                
            } catch (error) {
                console.error('Errore login:', error);
                
                if (error.message === 'Utente non autorizzato') {
                    showError('Accesso negato. Questo username non è autorizzato.');
                } else if (error.code === 'auth/wrong-password') {
                    showError('Password non valida');
                } else if (error.code === 'auth/user-not-found') {
                    showError('Utente non trovato');
                } else if (error.code === 'auth/too-many-requests') {
                    showError('Troppi tentativi falliti. Riprova più tardi.');
                } else {
                    showError('Errore durante il login: ' + (error.message || error.code));
                }
                
                // Riabilita bottone
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="bi bi-box-arrow-in-right"></i> Accedi alla Dashboard';
            }
        });

        // Mostra errore
        function showError(message) {
            errorDiv.textContent = message;
            errorDiv.classList.remove('d-none');
        }

        // Nascondi errore
        function hideError() {
            errorDiv.classList.add('d-none');
        }

        // Controlla se già loggato
        auth.onAuthStateChanged((user) => {
            if (user) {
                console.log('Utente già loggato');
                window.location.href = 'dashboard.html';
            }
        });

        function updateCartBadge() {
            const cart = JSON.parse(localStorage.getItem('sagraCart')) || [];
            const itemCount = cart.reduce((sum, item) => sum + item.quantity, 0);
            const badge = document.getElementById('cart-badge');
            if (badge) {
                badge.textContent = itemCount;
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            updateCartBadge();
            
            // Animazioni
            const fadeElements = document.querySelectorAll('.fade-in');
            
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                    }
                });
            }, { threshold: 0.2 });

            fadeElements.forEach(el => {
                observer.observe(el);
            });
        });
    </script>
